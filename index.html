<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="parent">

    <!--left side -->
    <div class="left">
        <img src="OIP (1).webp" alt="doctor image">

    </div>
        <!--right side -->
    
    <div class="right">

        <h1>Doctor Appointment Form</h1>

        <hr>

        <form action="">
            <label><strong>Appointment Date</strong></label>
            <input type="date">
            
            <br>
            <br>
            
            <label><strong>Appointment Time</strong></label>
            <input type="time">
            
            <br>
            <br>
            
            <label><strong>Name</strong></label>
            <input type="text" placeholder="First">
            <input type="text" placeholder="Last">
            
            <br>
            <br>
            <label><strong>Gender</strong></label>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
            
            <br>
            <br>
            
            <label><strong>Phone</strong></label>
            <input type="tel" placeholder="####">

            <br>
            <br>
            
            <label><strong>Address</strong></label>
            <input type="text" placeholder="City">
            <input type="text" placeholder="State">

            <br>
            <br>
            
            <label><strong>Your Query</strong></label>
            <textarea></textarea>
            
            <br>
            <br>

            <div class="row">

            <label class="title"><strong>Appointment Type</strong></label>

            <div class="check">
            <h4>Select which appointment type(s) you require</h4>
            <label><input type="checkbox"> Cervix Checkup</label>
            <label><input type="checkbox"> Heart Checkup</label>
            <label><input type="checkbox"> Eye Check-up</label>
            <label><input type="checkbox"> Hearing Test</label>

            </div>
            </div>
            <button type="submit">send</button>

        </form>


    </div>


</div>




</body>
